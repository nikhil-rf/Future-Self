services:
  - type: worker
    name: futureself-worker
    runtime: node
    rootDir: worker
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: POLL_CRON
        value: "* * * * *"
    autoDeploy: true
